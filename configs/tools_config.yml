primary_agent:
  llm: gpt-4.1-mini               # Cost-effective primary model (OpenAI default)
  router_llm: gpt-4.1-mini
  thinking_llm: gpt-4.1           # Higher-accuracy deep-thinking model
  fallback_llms:
    - gpt-4.1-mini
    - gpt-4.1-nano
  router_fallback_llms:
    - gpt-4.1-nano
  thinking_fallback_llms:
    - gpt-4.1
    - gpt-4.1-mini
  llm_temperature: 0.1          # Low temperature for deterministic clinical fact synthesis
  llm_provider: openai           # "google" for Gemini, "openai" for GPT models

clinical_notes_rag:
  llm: gpt-4.1-mini
  summarization_llm: gpt-4.1-mini
  fallback_llms:
    - gpt-4.1-mini
    - gpt-4.1-nano
  summarization_fallback_llms:
    - gpt-4.1
    - gpt-4.1-mini
  llm_temperature: 0.1          # Low temperature for deterministic clinical data retrieval
  embedding_model: NeuML/pubmedbert-base-embeddings
  embedding_dimensions: 768
  vectordb: data/clinical_notes_vectordb
  unstructured_docs: data/unstructured_docs/clinical_notes
  k: 8
  fetch_k: 15
  chunk_size: 1000
  chunk_overlap: 200
  collection_name: PatientData
  reranker_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  reranker_top_k: 8
  qdrant_url: "http://localhost:6333"  # Qdrant standalone server (Phase 5.1). Run start_qdrant.ps1 first.
  qdrant_api_key: ""
  uploads_directory: data/uploads  # where uploaded documents are stored
  max_upload_size_mb: 50           # max file size per upload
  supported_formats:               # accepted file extensions
    - .pdf
    - .docx
    - .png
    - .jpg
    - .jpeg
    - .tiff
    - .tif
    - .bmp

langsmith:
  tracing: "false"  # Set to "true" to enable LangSmith agent tracing. Requires LANGCHAIN_API_KEY in .env.
  project_name: "rag_sqlagent_project"

tavily_search_api:
  tavily_search_max_results: 2

graph_configs:
  thread_id: 1 # This can be adjusted to assign a unique value for each user session, so it's easier to access data later on.